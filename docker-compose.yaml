version: '3.9'

services:

  drone-sim:

    build:
      context: .
      dockerfile: docker/Dockerfile

    container_name: drone-sim

    ports:
      - "8000:8000"

    env_file:
      - .env

    environment:
      - ANONYMIZED_TELEMETRY=False
      - CHROMA_TELEMETRY_IMPL=none

    volumes:
      - ./chroma_db:/app/chroma_db
      - ./data:/app/data
      - ./panel_memory.json:/app/panel_memory.json
      - ./zone_memory.json:/app/zone_memory.json
      - ./panel_feedback.json:/app/panel_feedback.json
      - ./trace_logs.json:/app/trace_logs.json

    restart: unless-stopped